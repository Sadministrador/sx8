        // ==================== OTIMIZAÇÕES DE IMAGENS E VÍDEOS ====================

        const videoObserver = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                const video = entry.target;
                if (document.getElementById('area-tvsx').classList.contains('show')) return;

                if (entry.isIntersecting) {
                    // Pausa outros vídeos
                    document.querySelectorAll('video.video-feed').forEach(v => {
                        if (v !== video) {
                            v.pause();
                        }
                    });

                    videoAtual = video;
                    video.muted = false;           // ← SOM ABERTO
                    video.volume = 1.0;

                    // Força reprodução com áudio
                    const playPromise = video.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            // Fallback caso o navegador bloqueie autoplay
                            video.muted = false;
                            video.play().catch(() => {});
                        });
                    }

                    // Remove skeleton quando começar a tocar
                    const sk = video.parentElement?.querySelector('.video-skeleton');
                    if (sk) {
                        const hide = () => {
                            sk.style.opacity = '0';
                            setTimeout(() => { if (sk) sk.style.display = 'none'; }, 400);
                        };
                        if (video.readyState >= 3) hide();
                        else video.addEventListener('canplay', hide, { once: true });
                    }
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.65 });

        // Preload mais agressivo
        const preloadObserver = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const v = entry.target;
                    v.preload = 'auto';
                    preloadObserver.unobserve(v);
                }
            });
        }, { rootMargin: '1500px 0px', threshold: 0 });

        function registrarVideo(v) {
            v.preload = 'none';
            v.muted = false;           // ← ÁUDIO ABERTO POR PADRÃO
            v.volume = 1.0;
            v.playsInline = true;
            v.loop = true;

            // Melhoria de performance
            v.setAttribute('loading', 'lazy');
            v.setAttribute('decoding', 'async');

            preloadObserver.observe(v);
            videoObserver.observe(v);
        }
